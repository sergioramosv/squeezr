[proxy]
port = 8080

[compression]
threshold = 800          # min chars to compress a tool result
keep_recent = 3          # how many recent tool results to leave untouched
disabled = false
compress_system_prompt = true   # compress system prompt after first request
compress_conversation = true    # deterministic clean on old user/assistant messages + tool_use inputs (pure regex, no AI)
keep_recent_assistant = 3       # leave last N assistant turns untouched
assistant_threshold = 300       # min chars before applying prose cleanup
# skip_tools = ["Read"]         # never compress these tool types (Bash, Read, Grep, Glob...)
# only_tools = ["Bash"]         # only compress these tool types — overrides skip_tools
# Per-command: add "# squeezr:skip" anywhere in a Bash command to skip that result:
#   git diff HEAD~3  # squeezr:skip

[cache]
enabled = true
max_entries = 1000       # LRU cap for cached compressions

[adaptive]
enabled = true
# Thresholds adjust based on context pressure (% of model context used)
low_threshold = 1500     # < 50% context used
mid_threshold = 800      # 50-75%
high_threshold = 400     # 75-90%
critical_threshold = 150 # > 90% — compress everything possible

[local]
enabled = true
upstream_url = "http://localhost:11434"   # your Ollama URL
# Model used to compress tool results — must be pulled in your Ollama.
# Any model works. Recommended small models:
#   qwen2.5-coder:1.5b  (best for code, ~1GB RAM)
#   qwen2.5:1.5b        (good general, ~1GB RAM)
#   llama3.2:1b         (good English, ~800MB RAM)
#   qwen2.5:3b          (better quality, ~2GB RAM)
compression_model = "qwen2.5-coder:1.5b"
# Keys that indicate a local/dummy request (not a real cloud key)
dummy_keys = ["ollama", "lm-studio", "sk-no-key-required", "local", "none", ""]
